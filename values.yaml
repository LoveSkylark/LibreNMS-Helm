global:
  TZ: "Atlantic/Reykjavik"
  puid: "1000"
  pgid: "1000"
  company:
    name: "SENSA"  
    address: ""
    contact: ""

ingress:
  # For manual TLS you can create a secret first:
  # kubectl create secret tls https-cert --cert=<certificate-file> --key=<key-file> --namespace librenms
  https: false
  className: "traefik"
  redirectToHttps:
    enabled: false
  tls:
    existingSecretName: ""
    secretName: "https-cert"
  letsEncrypt:
    enabled: false
    createIssuer: false
    issuerKind: "ClusterIssuer"
    issuerName: "letsencrypt-prod"
    email: ""
    environment: "production"
    privateKeySecretName: "letsencrypt-account-key"
    server:
      production: "https://acme-v02.api.letsencrypt.org/directory"
      staging: "https://acme-staging-v02.api.letsencrypt.org/directory"
    acmeDns:
      host: ""
      accountSecretName: "acme-dns-credentials"

mariadb:
  enabled: true
  database: "librenms"
  timeout: "60"
  host:
    name: "database"
    volumeSize: "20Gi"
  credentials:
    rootPassword: "fooRootPassword"
    user: "foo"
    password: "bar"

rrdcached:
  enabled: true
  host:
    name: "lnms-rrdcached"
    port: "42217"

redis:
  enabled: true
  lnms:
    host: "lnms-redis"
    port: "6379"
    database: "0"
    scheme: "tcp"
    cacheDriver: "redis"
    sessionDriver: "redis"

application:
  replicas: "1"
  image: "librenms/librenms:latest"
  host:
    FQDN: "nms.test.local"
    name: "lnms-app"
    realIPfrom: "0.0.0.0/32"
    realIPheader: "X-Forwarded-For" 
    volumeSize: "20Gi"
    baseURL: ""
  logIP: "remote_addr"
  nodePort: "30080"
  uploadMAXsize: "16M"
  SNMPcommunity: 
    - "community-string-1"
    - "community-string-2"
  dispatcher:
    name: "lnms-dispatcher"
    replicas: "1"
    nodeID: "poller 1"
    args: ""
  weathermap:
    enable: true
    schedule: "*/5 * * * *"
  syslogng:
    enable: true
    name: "lnms-syslog"
    replicas: "1"
    purge: "95"
  trap:
    enable: true
    name: "lnms-trap"
    replicas: "1"
    purge: "95"
  lnms:
    services:
      enable: false
    graphs:
      type: "svg"
      dynamic: true
    billing:
      enable: true
      purge: "95"
      default95: "1"
    parsing:
      customers: "c"
      transit: "t"
      peering: "p"
      core: "i"
    installPlugins: ""
  php:
    memoryLimit: "1024M"
    maxInputVars: "1000"
    opcacheMemSize: "256"
  jobsInstall:
    keepOnSuccess: false
    debug: false

storage:
  path: "/opt/kubes/storage/"

xmatters:
  enable: false
  agent:
    enable: false
    URL: "company.xmatters.com"
    APIkey: ""
    APIsecret: ""

msmtpd:
  enable: true
  host:
    name: "msmtpd"
    FQDN: "smtp.gmail.com"
    port: "587"
  from: "foo@gmail.com"
  credentials:
    email:
      user: "foo"
      password: "bar"   

oxidized:
  enable: false
  host:
    FQDN: "ox.test.local"
  source:
    url: "http://lnms-app:8000/api/v0/oxidized"
  credentials:
    token: ""
  ignore:
    types: 
      - "server"
      - "power"
      - "storage"
    os: 
      - "linux"
      - "windows"
      - "jetdirect"
    groups:
      - ""
  # Device can be grouped by as string in the device NOTE or DESCRIPTION
  group:
    core:
      user: "deviceadmin"
      password: "devicepassword"
    # Optional group examples.
    # Include non-core groups only when user, password, and string are all set.
    #G1:
    #  user: "branch-ops-user"
    #  password: "change-me-branch-password"
    #  string: "ox-group-1"
    #  var: ""

    #Telnet:
    #  user: "dc-ops-user"
    #  password: "change-me-dc-password"
    #  string: "ox-group-2"
    #  var: ""

smokeping:
  enable: false
  host:
    FQDN: "smokeping.test.local"

saml:
  enable: false
  # Supported providers: "github", "microsoft", "okta", "saml2"
  provider: ""
  # Redirect login page to first configured provider (bool)
  redirect_login: false
  # Default role for authenticated users: none, normal, global-read, admin
  default_role: "global-read"
  client_id: ""
  client_secret: ""
  redirect: ""  # OAuth callback URL (GitHub/Microsoft/Okta), e.g., https://nms.example.com/auth/microsoft/callback
  # GitHub: no extra provider-specific fields required
  tenant: ""  # Microsoft ONLY: tenant id/domain, e.g., common or contoso.onmicrosoft.com
  base_url: ""  # Okta ONLY: instance URL, e.g., https://dev-123456.okta.com
  # Claim field for providers that deliver roles/groups under token claims
  # Microsoft example: claim_field: "roles"
  claim_field: ""
  # Claims mapping: maps returned claim values to LibreNMS roles
  # Example: claim value "librenms-admin" -> admin role, "librenms-read" -> global-read role
  claims: {}
    # Example for Microsoft groups:
    # librenms-admin:
    #   - "admin"
    # librenms-read:
    #   - "global-read"
  saml2:
    metadata: ""  # SAML2 ONLY: IdP metadata URL or XML content
  # Provider-specific scopes
  microsoft:
    scopes:
      - "openid"
      - "profile"
      - "email"
  github:
    scopes: []
  okta:
    scopes: []
