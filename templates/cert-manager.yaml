{{- if and .Values.ingress.https .Values.ingress.redirectToHttps.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-https-redirect
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}

{{- if and .Values.ingress.https .Values.ingress.letsEncrypt.enabled .Values.ingress.letsEncrypt.createIssuer (not .Values.ingress.tls.existingSecretName) }}
---
apiVersion: cert-manager.io/v1
kind: {{ .Values.ingress.letsEncrypt.issuerKind }}
metadata:
  name: {{ .Values.ingress.letsEncrypt.issuerName | quote }}
{{- if eq .Values.ingress.letsEncrypt.issuerKind "Issuer" }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  acme:
    email: {{ .Values.ingress.letsEncrypt.email | quote }}
{{- if eq .Values.ingress.letsEncrypt.environment "staging" }}
    server: {{ .Values.ingress.letsEncrypt.server.staging | quote }}
{{- else }}
    server: {{ .Values.ingress.letsEncrypt.server.production | quote }}
{{- end }}
    privateKeySecretRef:
      name: {{ .Values.ingress.letsEncrypt.privateKeySecretName | quote }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.ingress.className | quote }}
{{- end }}
