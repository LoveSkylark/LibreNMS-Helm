{{- if and .Values.ingress.https .Values.ingress.redirectToHttps.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-https-redirect
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}
