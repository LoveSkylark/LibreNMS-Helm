---
{{- $tlsSecretName := default .Values.ingress.tls.secretName .Values.ingress.tls.existingSecretName }}
{{- $issuerKind := default "ClusterIssuer" .Values.ingress.letsEncrypt.issuerKind }}
{{- $issuerName := default "letsencrypt-prod" .Values.ingress.letsEncrypt.issuerName }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-application"
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
  annotations:
{{- if .Values.ingress.https }}  
{{- if .Values.ingress.redirectToHttps.enabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s@kubernetescrd" .Release.Namespace (printf "%s-https-redirect" .Release.Name) | quote }}
{{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
{{- end }}
    traefik.ingress.kubernetes.io/router.tls: "true"
{{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: web
{{- end }}
{{- if and .Values.ingress.https .Values.ingress.letsEncrypt.enabled (not .Values.ingress.tls.existingSecretName) }}
{{- if eq $issuerKind "Issuer" }}
    cert-manager.io/issuer: {{ $issuerName | quote }}
{{- else }}
    cert-manager.io/cluster-issuer: {{ $issuerName | quote }}
{{- end }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
  - host: {{ .Values.application.host.FQDN | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.application.host.name }}
            port:
              number: 8000
{{- if .Values.smokeping.enable }}
  - host: {{ .Values.smokeping.host.FQDN | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smokeping
            port:
              number: 8081
{{- end }}
{{- if .Values.oxidized.enable }}
  - host: {{ .Values.oxidized.host.FQDN | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oxidized
            port:
              number: 8888
{{- end }}
  # Catch-all rule for IP access (no host specified)
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.application.host.name }}  # Main application service
            port:
              number: 8000
{{- if .Values.ingress.https }}  
  tls:
  - hosts:
    - {{ .Values.application.host.FQDN }}
{{- if .Values.smokeping.enable }}
    - {{ .Values.smokeping.host.FQDN }}
{{- end }}
{{- if .Values.oxidized.enable }}
    - {{ .Values.oxidized.host.FQDN }}
{{- end }}
    secretName: {{ $tlsSecretName | quote }}
{{- end }}

---
{{- if .Values.application.syslogng.enable }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-syslog-tcp"
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: {{ .Values.application.syslogng.name | quote }}
  ports:
    - name: syslog-tcp
      protocol: TCP
      port: 514
      targetPort: syslog-tcp

---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-syslog-udp"
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: {{ .Values.application.syslogng.name | quote }}
  ports:
    - name: syslog-udp
      protocol: UDP
      port: 514
      targetPort: syslog-udp
{{- end }}

---
{{- if .Values.application.trap.enable }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-trap-tcp"
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: {{ .Values.application.trap.name | quote }}
  ports:
    - name: trap-tcp
      protocol: TCP
      port: 162
      targetPort: trap-tcp

---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-trap-udp"
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: {{ .Values.application.trap.name | quote }}
  ports:
    - name: trap-udp
      protocol: UDP
      port: 162
      targetPort: trap-udp
{{- end }}


