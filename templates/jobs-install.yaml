---
apiVersion: batch/v1
kind: Job
metadata:
  name: depl-librenms
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": {{ ternary "before-hook-creation" "hook-succeeded" .Values.application.jobsInstall.keepOnSuccess | quote }}
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  template:
    spec:
      containers:
      - name: depl-librenms
        image: {{ .Values.application.image | quote }}
        args:
          - /bin/sh 
          - "-c"
          - |
            set -eu
{{- if .Values.application.jobsInstall.debug }}
            set -x
{{- end }}
            su librenms -s /bin/sh -c "true" >/dev/null 2>&1 || true
            lnms config:set device_display_default    '{{ "{{" }} $sysName_fallback }}'
            lnms config:set snmp.community            '{{ .Values.application.SNMPcommunity | toJson }}'
            lnms config:set webui.graph_type          {{ .Values.application.lnms.graphs.type | quote }}
            lnms config:set webui.dynamic_graphs      {{ .Values.application.lnms.graphs.dynamic | quote }}
            lnms config:set enable_syslog             {{ .Values.application.syslogng.enable | quote }}
            lnms config:set syslog_purge              {{ .Values.application.syslogng.purge | quote }}
            lnms config:set show_services             {{ .Values.application.lnms.services.enable | quote }}
            # Billing;
            lnms config:set enable_billing            {{ .Values.application.lnms.billing.enable | quote }}
            # Parsing;
            lnms config:set customers_descr.2         {{ .Values.application.lnms.parsing.customers | quote }}
            lnms config:set transit_descr.2           {{ .Values.application.lnms.parsing.transit | quote }}
            lnms config:set peering_descr.2           {{ .Values.application.lnms.parsing.peering | quote }}
            lnms config:set core_descr.2              {{ .Values.application.lnms.parsing.core | quote }}
{{- if and .Values.saml.enable (ne .Values.saml.provider "") }}
{{- if eq .Values.saml.provider "github" }}
{{- if .Values.saml.client_id }}
            lnms config:set auth.socialite.configs.github.client_id {{ .Values.saml.client_id | quote }}
            lnms config:set auth.socialite.configs.github.client_secret {{ .Values.saml.client_secret | quote }}
{{- if .Values.saml.callback }}
            lnms config:set auth.socialite.configs.github.redirect {{ .Values.saml.callback | quote }}
{{- end }}
            lnms config:set auth.socialite.configs.github.listener "\SocialiteProviders\GitHub\GitHubExtendSocialite"
{{- end }}
{{- if .Values.saml.github.scopes }}
            lnms config:set auth.socialite.scopes {{ .Values.saml.github.scopes | toJson | squote }}
{{- end }}
{{- else if eq .Values.saml.provider "microsoft" }}
{{- if .Values.saml.client_id }}
            lnms config:set auth.socialite.configs.microsoft.client_id {{ .Values.saml.client_id | quote }}
            lnms config:set auth.socialite.configs.microsoft.client_secret {{ .Values.saml.client_secret | quote }}
{{- if .Values.saml.callback }}
            lnms config:set auth.socialite.configs.microsoft.redirect {{ .Values.saml.callback | quote }}
{{- end }}
{{- if .Values.saml.tenant }}
            lnms config:set auth.socialite.configs.microsoft.tenant {{ .Values.saml.tenant | quote }}
{{- end }}
            lnms config:set auth.socialite.configs.microsoft.listener "\SocialiteProviders\Microsoft\MicrosoftExtendSocialite"
{{- end }}
{{- if .Values.saml.microsoft.scopes }}
            lnms config:set auth.socialite.scopes {{ .Values.saml.microsoft.scopes | toJson | squote }}
{{- end }}
{{- else if eq .Values.saml.provider "okta" }}
{{- if .Values.saml.client_id }}
            lnms config:set auth.socialite.configs.okta.client_id {{ .Values.saml.client_id | quote }}
            lnms config:set auth.socialite.configs.okta.client_secret {{ .Values.saml.client_secret | quote }}
{{- if .Values.saml.callback }}
            lnms config:set auth.socialite.configs.okta.redirect {{ .Values.saml.callback | quote }}
{{- end }}
            lnms config:set auth.socialite.configs.okta.base_url {{ .Values.saml.base_url | quote }}
            lnms config:set auth.socialite.configs.okta.listener "\SocialiteProviders\Okta\OktaExtendSocialite"
{{- end }}
{{- if .Values.saml.okta.scopes }}
            lnms config:set auth.socialite.scopes {{ .Values.saml.okta.scopes | toJson | squote }}
{{- end }}
{{- else if eq .Values.saml.provider "saml2" }}
{{- if .Values.saml.saml2.metadata }}
            lnms config:set auth.socialite.configs.saml2.metadata {{ .Values.saml.saml2.metadata | quote }}
            lnms config:set auth.socialite.configs.saml2.listener "\SocialiteProviders\Saml2\Saml2ExtendSocialite"
{{- end }}
{{- end }}
{{- if .Values.saml.claim_field }}
            lnms config:set auth.socialite.configs.{{ .Values.saml.provider }}.claim_field {{ .Values.saml.claim_field | quote }}
{{- end }}
{{- if .Values.saml.claims }}
{{- range $claim, $roles := .Values.saml.claims }}
            lnms config:set auth.socialite.claims.{{ $claim }}.roles {{ $roles | toJson | squote }}
{{- end }}
{{- end }}
            lnms config:set auth.socialite.redirect {{ .Values.saml.redirect | quote }}
            lnms config:set auth.socialite.register {{ .Values.saml.register | quote }}
            lnms config:set auth.socialite.default_role {{ .Values.saml.default_role | quote }}
{{- end }}
{{- if .Values.application.jobsInstall.debug }}
            echo "=== LibreNMS config verification ==="
            lnms config:get device_display_default || true
            lnms config:get snmp.community || true
{{- if and .Values.saml.enable (ne .Values.saml.provider "") }}
            lnms config:get auth.socialite || true
{{- end }}
{{- end }}
        env:
          - name: DB_HOST
            value: {{ .Values.mariadb.host.name }}
          - name: DB_NAME 
            value: {{ .Values.mariadb.database | quote }}
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-sec
                key: mysql_user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-sec
                key: mysql_password
      restartPolicy: Never
  backoffLimit: 4
