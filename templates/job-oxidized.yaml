{{- if .Values.oxidized.enable }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: depl-oxidized
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
  labels:
{{ include "common.labels" . | indent 4 }}
spec:
  template:
    spec:
      containers:
      - name: depl-oxidized
        image: {{ .Values.application.image | quote }}
        args:
          - /bin/sh 
          - "-c"
          - |
            su librenms 
            lnms config:set oxidized.url "http://oxidized:8888"
            # Basic config
            lnms config:set oxidized.enabled              {{ .Values.oxidized.enable | quote }}
            lnms config:set oxidized.default_group        {{ .Values.oxidized.default_group | default "core" | quote }}
            lnms config:set oxidized.features.versioning  {{ .Values.oxidized.featureVers | default true | quote }}
            lnms config:set oxidized.group_support        {{ .Values.oxidized.groupSupport | default true | quote }}
            lnms config:set oxidized.reload_nodes         {{ .Values.oxidized.reloadNodes | default true | quote }}
            # Ignore devices
            lnms config:set oxidized.ignore_os            '{{ .Values.oxidized.ignore.os | toJson }}' --ignore-checks
            lnms config:set oxidized.ignore_types         '{{ .Values.oxidized.ignore.types | toJson }}' --ignore-checks
            lnms config:set oxidized.ignore_groups        '{{ .Values.oxidized.ignore.groups | toJson }}' --ignore-checks
            # Build group mappings for every non-core group with a regex string.
{{- range $groupName, $group := .Values.oxidized.group }}
{{- if and (ne $groupName "core") $group.string }}
            lnms config:set oxidized.maps.group.purpose.{{ $groupName }} '{"regex": {{ $group.string | quote }}, "value": "{{ $groupName }}"}' --ignore-checks
            lnms config:set oxidized.maps.group.notes.{{ $groupName }} '{"regex": {{ $group.string | quote }}, "value": "{{ $groupName }}"}' --ignore-checks
{{- end }}
{{- end }}
        env:
          - name: DB_HOST
            value: {{ .Values.mariadb.host.name | quote }}
          - name: DB_NAME 
            value: {{ .Values.mariadb.database | quote }}
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-sec
                key: mysql_user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-sec
                key: mysql_password
      restartPolicy: Never
  backoffLimit: 4
{{- end }}
