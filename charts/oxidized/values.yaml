---
enable: true

image: "oxidized/oxidized:latest"
replicas: "1"
reloadInterval: 600
host:
  name: "oxidized"
  FQDN: "ox.test.local"

source:
  url: "http://lnms-app:8000/api/v0/oxidized"

groupSupport: true
featureVers: true
reloadNodes: true

ignore:
  types: 
    - server
    - power
  os: 
    - linux
    - windows
  groups:
    - ""
  
default_group: "core"
group:
  core:
    user: "deviceuser"
    password: "devicepassword"
    var: ""
credentials:
  token: ""